name: Build Signed Android APK

on:
  push:
    branches: [main]   # ou ton branche principale
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci
        
      - name: Install Capacitor CLI
        run: npm install -g @capacitor/cli

      - name: Build web app
        run: npm run build

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Android licenses
        run: yes | sdkmanager --licenses

      - name: Install required SDK packages
        run: |
          sdkmanager "platform-tools"
          sdkmanager "platforms;android-34"
          sdkmanager "build-tools;34.0.0"

      - name: Add Android platform if missing
        run: npx cap add android || true

      - name: Copy web assets
        run: npx cap copy android

      - name: Sync Capacitor plugins
        run: npx cap sync android

      - name: Debug Android structure
        run: ls -R android
        
      - name: Build signed release APK (verbose)
        env:
          RELEASE_KEYSTORE_PASSWORD: ${{ secrets.RELEASE_KEYSTORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
        run: |
          echo "sdk.dir=$ANDROID_SDK_ROOT" > android/local.properties
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease --stacktrace --info

      - name: Debug assets
        run: ls -R android/app/src/main/assets

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: signed-release-apk
          path: android/app/build/outputs/apk/release/*.apk
